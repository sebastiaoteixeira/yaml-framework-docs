name: Deploy Docs to GitHub Pages

on:
  repository_dispatch:
    types: [docs-updated]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout docs site
        uses: actions/checkout@v4

      - name: Sparse checkout docs from source repo
        uses: actions/checkout@v4
        with:
          repository: sebastiaoteixeira/yaml-framework
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          sparse-checkout: docs
          path: source-repo

      - name: Copy docs content
        run: |
          mkdir -p content/docs
          cp -r source-repo/docs/* content/docs/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
